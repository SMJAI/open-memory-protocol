<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #111;
    }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    h1 { font-size: 15px; font-weight: 700; }
    .tagline { font-size: 11px; color: #6b7280; margin-bottom: 14px; }
    .status { font-size: 12px; margin-bottom: 10px; }
    .stat {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 10px; background: #f9fafb; border-radius: 8px;
      margin-bottom: 12px;
    }
    .count { font-weight: 700; color: #6366f1; font-size: 22px; }
    .mem-list { margin-bottom: 14px; max-height: 100px; overflow-y: auto; }
    label { display: block; font-weight: 500; margin-bottom: 3px; font-size: 12px; }
    input {
      width: 100%; padding: 7px 9px;
      border: 1px solid #d1d5db; border-radius: 7px;
      font-size: 12px; margin-bottom: 10px; color: #111;
    }
    input:focus { outline: none; border-color: #6366f1; }
    button {
      width: 100%; padding: 9px;
      background: #6366f1; color: white;
      border: none; border-radius: 8px;
      cursor: pointer; font-size: 13px; font-weight: 500;
      transition: background 0.15s;
      margin-bottom: 8px;
    }
    button:hover { background: #4f46e5; }
    button.secondary {
      background: white; color: #6366f1;
      border: 1.5px solid #6366f1;
    }
    button.secondary:hover { background: #ede9fe; }
    .footer { margin-top: 8px; font-size: 10px; color: #9ca3af; text-align: center; }
    a { color: #6366f1; text-decoration: none; }
    .divider { border: none; border-top: 1px solid #f3f4f6; margin: 12px 0; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:20px;">🧠</span>
    <h1>OMP Bridge</h1>
  </div>
  <div class="tagline">Portable AI memory — Claude, ChatGPT, Gemini and more</div>

  <div class="status" id="status">Connecting...</div>

  <div class="stat">
    <span style="color:#6b7280;">Memories on your server</span>
    <span class="count" id="memCount">—</span>
  </div>

  <div class="mem-list" id="memList"></div>

  <hr class="divider">

  <label>OMP Server URL</label>
  <input id="server" type="text" placeholder="http://localhost:3456">

  <label>API Key <span style="font-weight:400;color:#9ca3af;">(optional)</span></label>
  <input id="apiKey" type="password" placeholder="Leave empty if not set">

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:8px 10px;background:#f9fafb;border-radius:8px;">
    <div>
      <div style="font-weight:500;font-size:12px;">Auto-inject on new chat</div>
      <div style="font-size:11px;color:#9ca3af;">Memories added automatically — no click needed</div>
    </div>
    <label style="position:relative;display:inline-block;width:36px;height:20px;margin:0;">
      <input type="checkbox" id="autoInject" style="opacity:0;width:0;height:0;position:absolute;">
      <span id="toggleSlider" style="position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#d1d5db;border-radius:20px;transition:.2s;"></span>
    </label>
  </div>

  <button id="save">Save & Refresh</button>

  <button class="secondary" id="saveConv">💬 Save this conversation to OMP</button>
  <div id="saveConvStatus" style="font-size:11px;color:#6b7280;text-align:center;min-height:16px;margin-bottom:4px;"></div>

  <div class="footer">
    <a href="https://github.com/SMJAI/open-memory-protocol" target="_blank">
      github.com/SMJAI/open-memory-protocol
    </a>
  </div>

  <script src="dist/popup.js"></script>
</body>
</html>
